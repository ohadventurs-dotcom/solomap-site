  <style>
    :root { --bg:#0A1628; --bg-soft:#0F1E33; --text:#fff; --muted:#A9B6C7; --gold:#E8A44A; --gold-hover:#F2B765; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { overflow-x:hidden; max-width:100%; }
    body { font-family:'Heebo',system-ui,sans-serif; background:var(--bg); color:var(--text);
      line-height:1.6; -webkit-font-smoothing:antialiased; text-align:center; min-height:100vh;

      background-image:radial-gradient(circle at 50% 12%, rgba(232,164,74,.12), transparent 55%); }
    .wrap { max-width:520px; margin:0 auto; padding:32px 18px; }
    h1 { font-size:clamp(28px,7vw,42px); font-weight:800; line-height:1.2; letter-spacing:-0.5px; }
    .subtitle { font-size:clamp(17px,4.2vw,20px); color:var(--muted); font-weight:400; margin-top:12px; }

    .form-card { background:var(--bg-soft); border:1px solid rgba(232,164,74,0.18);
      border-radius:16px; padding:24px 20px; margin:24px 0 16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.45); }

    /* טופס מותאם — רספונסיבי מלא */
    #optin { display:flex; flex-direction:column; text-align:right; }
    #optin label { color:#fff; font-weight:600; font-size:16px; margin:12px 2px 6px; }
    #optin label:first-child { margin-top:0; }
    #optin input {
      width:100%; padding:14px 16px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.22); background:#fff; color:#0A1628;
      font-size:16px; font-family:'Heebo',sans-serif; /* 16px מונע זום ב-iOS */ }
    #optin input::placeholder { color:#9aa3af; }
    #optin input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(232,164,74,0.25); }
    #optin button {
      margin-top:22px; width:100%; background:var(--gold); color:#0A1628;
      font-weight:800; font-size:clamp(17px,4.5vw,20px); font-family:'Heebo',sans-serif;
      border:0; border-radius:999px; padding:16px 20px; cursor:pointer;
      transition:background .15s ease, transform .15s ease;
      box-shadow:0 8px 24px rgba(232,164,74,0.25); }
    #optin button:hover { background:var(--gold-hover); transform:translateY(-1px); }
    #optin button:disabled { opacity:.6; cursor:default; transform:none; }
    .form-msg { margin-top:12px; font-size:14px; min-height:18px; }
    .form-msg.err { color:#ff9b9b; }
    .form-msg.ok { color:#9be8a4; }

    .proof { font-size:clamp(15px,4vw,18px); font-weight:500; color:var(--muted); margin-top:6px; }
    .proof span { color:var(--gold); font-weight:700; }
    footer { color:var(--muted); font-size:15px; margin-top:20px; }

<body>
  <div class="wrap">
    <h1>לא חסר לך מידע.<br>אז למה אתה עדיין לא טס?</h1>
    <p class="subtitle">תשאיר פרטים ואשלח לך סרטון של 14 דקות על מה שבאמת עוצר אותך.</p>

    <div class="form-card">
      <form id="optin" novalidate>
        <label for="name">איך קוראים לך?</label>
        <input id="name" name="name" type="text" autocomplete="name" required>

        <label for="email">לאן לשלוח את הסרטון?</label>
        <input id="email" name="email" type="email" autocomplete="email" inputmode="email" required>

        <label for="phone">טלפון (לוואטסאפ)</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" inputmode="tel" required>

        <button type="submit">שלחו לי את הסרטון ←</button>
        <p class="form-msg" id="msg"></p>
      </form>
    </div>

    <p class="proof"><span>11 שנים</span> | <span>50 מדינות</span> | <span>400 מטיילים</span></p>
    <footer><span dir="ltr">@ohadventurs</span></footer>
  </div>

  <script>
    // ===== חיבור הטופס =====
    // כשיהיה API/Make: הדבק כאן את כתובת ה-webhook של Make (או endpoint שמוסיף לרשימה 106584 ברב מסר)
    var WEBHOOK_URL = '/.netlify/functions/optin';
    var REDIRECT_TO = '/watch';

    var form = document.getElementById('optin');
    var msg = document.getElementById('msg');
    var btn = form.querySelector('button');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      msg.className = 'form-msg';
      var data = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim()
      };
      if (!data.name || !data.email || !data.phone) {
        msg.textContent = 'נשמח לשם, מייל וטלפון.'; msg.className = 'form-msg err'; return;
      }
      if (!WEBHOOK_URL) {
        msg.textContent = 'הטופס עדיין לא חובר ל-API (בקרוב).'; msg.className = 'form-msg err'; return;
      }
      btn.disabled = true; msg.textContent = 'שולח...';
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      }).then(function (res) {
        if (!res.ok) throw new Error('bad');
        if (window.fbq) fbq('track', 'Lead');
        if (window.clarity) clarity('event', 'optin_submit');
        window.location.href = REDIRECT_TO;
      }).catch(function () {
        btn.disabled = false;
        msg.textContent = 'משהו השתבש, נסה שוב.'; msg.className = 'form-msg err';
      });
    });
  </script>
</body>
