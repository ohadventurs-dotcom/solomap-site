  <style>
    :root {
      --bg: #0A1628;
      --bg-soft: #0F1E33;
      --text: #FFFFFF;
      --muted: #A9B6C7;
      --gold: #E8A44A;
      --gold-hover: #F2B765;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Heebo', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-align: center;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===== Hero ===== */
    .hero {
      padding: 26px 0 10px;
    }

    h1 {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: clamp(17px, 4.2vw, 21px);
      color: var(--muted);
      font-weight: 400;
      margin-top: 10px;
    }

    /* ===== Video ===== */
    .video-section { padding: 8px 0 6px; }

    .video-frame {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      border: 1px solid rgba(232,164,74,0.18);
    }

    .video-frame iframe {
      position: absolute;
      top: 0; right: 0;
      width: 100%; height: 100%;
      border: 0;
    }

    .unmute-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%; height: 100%;
      border: 0;
      cursor: pointer;
      background: rgba(10,22,40,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Heebo', sans-serif;
    }
    .unmute-overlay span {
      background: var(--gold);
      color: #0A1628;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      padding: 14px 30px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .unmute-overlay.hidden { display: none; }

    /* ===== CTA ===== */
    .cta-block { padding: 18px 0; transition: filter .7s ease, opacity .7s ease; }
    /* נעול: מוצג מטושטש ולא-לחיץ מההתחלה (יוצר סקרנות), נחשף אחרי 3 דק' צפייה עם קול */
    .cta-block.is-locked { filter: blur(9px); opacity: .9; pointer-events: none; user-select: none; }

    .cta-btn {
      display: inline-block;
      background: var(--gold);
      color: #0A1628;
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 700;
      text-decoration: none;
      padding: 18px 38px;
      border-radius: 999px;
      transition: transform .15s ease, background .15s ease;
      box-shadow: 0 8px 24px rgba(232,164,74,0.25);
    }

    .cta-btn:hover { background: var(--gold-hover); transform: translateY(-2px); }
    .cta-btn:active { transform: translateY(0); }

    .cta-sub {
      color: var(--muted);
      font-size: 15px;
      margin-top: 14px;
    }

    /* ===== Social proof ===== */
    .proof {
      padding: 14px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: var(--bg-soft);
    }

    .proof-line {
      font-size: clamp(16px, 4vw, 19px);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .proof-line span { color: var(--gold); font-weight: 700; }

    /* ===== Footer ===== */
    footer {
      padding: 16px 0 22px;
      color: var(--muted);
      font-size: 15px;
    }

    footer a { color: var(--gold); text-decoration: none; }

<body>

  <!-- Hero -->
  <header class="hero">
    <div class="wrap">
      <h1>לא חסר לך מידע.<br>אז למה אתה עדיין לא טס?</h1>
      <p class="subtitle">הקלטתי לך 14 דקות על מה שבאמת עוצר אותך</p>
    </div>
  </header>

  <!-- Video -->
  <section class="video-section">
    <div class="wrap">
      <div class="video-frame">
        <iframe
          id="vsl"
          src="https://player.vimeo.com/video/1201729834?badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&muted=1"
          title="סולומאפ"
          allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen></iframe>
        <button id="unmute" class="unmute-overlay" type="button">
          <span>🔊 הקש להפעלת הקול</span>
        </button>
      </div>
    </div>
  </section>

  <!-- CTA 1 — מטושטש מההתחלה, נחשף אחרי 3 דקות צפייה עם קול (VSL delayed CTA) -->
  <section class="cta-block is-locked" id="cta1">
    <div class="wrap">
      <a class="cta-btn" href="https://solomaster.fillout.com/ohadventurs?ref=vsl-b">בוא נדבר על הטיול שלך →</a>
      <p class="cta-sub">ממלאים שאלון קצר ומתאמים שיחה של 30 דקות, בלי התחייבות</p>
    </div>
  </section>

  <!-- Social proof -->
  <section class="proof">
    <div class="wrap">
      <p class="proof-line"><span>11 שנים</span> | <span>50 מדינות</span> | <span>400 מטיילים</span></p>
    </div>
  </section>

  <footer>
    <div class="wrap"><span dir="ltr">@ohadventurs</span></div>
  </footer>

  <!-- ===== מעקב משפך: לחיצות CTA + צפייה בסרטון ===== -->
  <script>
    // 1) לחיצה על כל כפתור CTA → Fillout
    document.querySelectorAll('.cta-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (window.fbq) fbq('trackCustom', 'CTAClick');
        if (window.clarity) clarity('event', 'cta_click');
      });
    });

    // 2) Vimeo: autoplay מושתק + שכבת "הקש להפעלת הקול"
    var tag = document.createElement('script');
    tag.src = 'https://player.vimeo.com/api/player.js';
    tag.onload = function () {
      var player = new Vimeo.Player('vsl');
      var overlay = document.getElementById('unmute');
      var unmuted = false;
      var fired = { 25: false, 50: false, 75: false, 90: false };
      var cta = document.getElementById('cta1');

      // לחיצה על השכבה = קול מההתחלה (כדי לא לפספס את הפתיח)
      overlay.addEventListener('click', function () {
        unmuted = true;
        player.setMuted(false);
        player.setCurrentTime(0).then(function () { return player.play(); }).catch(function () {});
        overlay.classList.add('hidden');
        if (window.fbq) fbq('trackCustom', 'VideoPlay'); // נגינה עם קול = כוונה אמיתית
        if (window.clarity) clarity('event', 'video_unmute');
      });

      // אבני דרך — נספרות רק אחרי שיש קול (לא על ה-autoplay המושתק)
      player.on('timeupdate', function (data) {
        if (!unmuted) return;
        // VSL: חשיפת הכפתור (הסרת הטשטוש) אחרי 3 דקות צפייה עם קול
        if (data.seconds >= 180 && cta && cta.classList.contains('is-locked')) {
          cta.classList.remove('is-locked');
          if (window.fbq) fbq('trackCustom', 'CTARevealed');
          if (window.clarity) clarity('event', 'cta_revealed');
        }
        var p = data.percent * 100;
        [25, 50, 75, 90].forEach(function (m) {
          if (p >= m && !fired[m]) {
            fired[m] = true;
            if (window.fbq) fbq('trackCustom', 'VideoProgress', { percent: m });
            if (m === 50 && window.fbq) fbq('track', 'ViewContent'); // אירוע סטנדרטי לאופטימיזציה
            if (window.clarity) clarity('event', 'video_' + m);
          }
        });
      });
    };
    document.head.appendChild(tag);
  </script>

</body>
